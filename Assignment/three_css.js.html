<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Validation</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #eef2f3;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 40px;
    }

    .form-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
        font-weight: bold;
    }

    input, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

    .error {
        color: red;
        font-size: 14px;
        margin-bottom: 10px;
    }

    .result-box {
        margin-top: 20px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        display: none;
    }

    .row {
        display: flex;
        margin: 5px 0;
    }

    .key {
        width: 90px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="form-box">
    <h2>Registration Form</h2>

    <div class="error" id="errorMsg"></div>

    <form id="myForm">
        <label>Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Message</label>
        <textarea id="message" rows="4" required></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

<div class="result-box" id="resultBox">
    <h3>Submitted Details</h3>

    <div class="row">
        <div class="key">Name:</div>
        <div id="rName"></div>
    </div>

    <div class="row">
        <div class="key">Email:</div>
        <div id="rEmail"></div>
    </div>

    <div class="row">
        <div class="key">Message:</div>
        <div id="rMessage"></div>
    </div>
</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();
    let errorMsg = document.getElementById("errorMsg");

    errorMsg.textContent = "";

    // Validation rules
    let nameHasNumber = /\d/.test(name);
    let messageOnlyNumbers = /^\d+$/.test(message);
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (nameHasNumber) {
        errorMsg.textContent = "Name should not contain numbers!";
        return;
    }

    if (!emailPattern.test(email)) {
        errorMsg.textContent = "Enter a valid email address!";
        return;
    }

    if (messageOnlyNumbers) {
        errorMsg.textContent = "Message cannot contain only numbers!";
        return;
    }

    // Show output if valid
    document.getElementById("rName").textContent = name;
    document.getElementById("rEmail").textContent = email;
    document.getElementById("rMessage").textContent = message;

    document.getElementById("resultBox").style.display = "block";
});
</script>

</body>
</html>
