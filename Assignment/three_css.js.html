<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form with Loops & Inputs</title>

<style>
    body {
        font-family: Arial;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
    }

    .box {
        background: white;
        padding: 20px;
        width: 400px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    fieldset {
        margin-bottom: 15px;
        border: 1px solid #ccc;
        padding: 10px;
        border-radius: 5px;
    }

    legend {
        font-weight: bold;
    }

    .error {
        color: red;
        margin-bottom: 10px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: green;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: darkgreen;
    }

    .output {
        margin-top: 15px;
        background: #e9ffe9;
        padding: 10px;
        border-radius: 5px;
    }
</style>
</head>

<body>

<div class="box">

<h2>Student Form</h2>

<div class="error" id="error"></div>

<form id="myForm">

<!-- TEXT INPUT -->
<fieldset>
    <legend>Personal Info</legend>

    <label>Name:</label>
    <input type="text" id="name"><br><br>

    <label>Age:</label>
    <input type="number" id="age">
</fieldset>

<!-- RADIO BUTTON -->
<fieldset>
    <legend>Gender</legend>
    <input type="radio" name="gender" value="Male"> Male<br>
    <input type="radio" name="gender" value="Female"> Female<br>
</fieldset>

<!-- CHECKBOX -->
<fieldset>
    <legend>Hobbies</legend>
    <input type="checkbox" value="Reading"> Reading<br>
    <input type="checkbox" value="Sports"> Sports<br>
    <input type="checkbox" value="Music"> Music<br>
</fieldset>

<button type="submit">Submit</button>

</form>

<div class="output" id="output"></div>

</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let age = document.getElementById("age").value.trim();
    let error = document.getElementById("error");
    let output = document.getElementById("output");

    error.textContent = "";
    output.innerHTML = "";

    // ❌ Validation (no numbers in name using WHILE-style check logic)
    let i = 0;
    while (i < name.length) {
        if (!isNaN(name[i]) && name[i] !== " ") {
            error.textContent = "Name should NOT contain numbers!";
            return;
        }
        i++;
    }

    // RADIO BUTTON CHECK
    let gender = "";
    let radios = document.getElementsByName("gender");
    for (let j = 0; j < radios.length; j++) {
        if (radios[j].checked) {
            gender = radios[j].value;
        }
    }

    if (gender === "") {
        error.textContent = "Please select gender!";
        return;
    }

    // CHECKBOX LOOP
    let hobbies = [];
    let boxes = document.querySelectorAll("input[type='checkbox']");
    for (let k = 0; k < boxes.length; k++) {
        if (boxes[k].checked) {
            hobbies.push(boxes[k].value);
        }
    }

    if (hobbies.length === 0) {
        error.textContent = "Select at least one hobby!";
        return;
    }

    // OUTPUT
    output.innerHTML = `
        <h3>Submitted Data</h3>
        <p><b>Name:</b> ${name}</p>
        <p><b>Age:</b> ${age}</p>
        <p><b>Gender:</b> ${gender}</p>
        <p><b>Hobbies:</b> ${hobbies.join(", ")}</p>
    `;
});
</script>

</body>
</html>
