<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Short Form</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 20px; width: 350px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { margin-bottom: 15px; padding: 10px; border-left: 4px solid #3498db; background: #f9f9f9; }
        .title { font-weight: bold; color: #3498db; font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 6px; margin: 5px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #error { color: #e74c3c; font-size: 14px; margin-bottom: 10px; }
        #out { margin-top: 15px; padding: 10px; background: #eef9ff; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h3>Registration</h3>
    <div id="error"></div>
    <form id="f">
        <div class="section">
            <span class="title">Info</span>
            <input type="text" name="name" placeholder="Name" required>
            <input type="number" name="age" placeholder="Age" required>
        </div>
        <div class="section">
            <span class="title">Gender</span>
            <label><input type="radio" name="gen" value="Male"> M</label>
            <label><input type="radio" name="gen" value="Female"> F</label>
        </div>
        <div class="section">
            <span class="title">Hobbies</span>
            <label><input type="checkbox" name="h" value="Read"> Read</label>
            <label><input type="checkbox" name="h" value="Sport"> Sport</label>
        </div>
        <button type="submit">Submit</button>
    </form>
    <div id="out"></div>
</div>

<script>
document.getElementById("f").onsubmit = function(e) {
    e.preventDefault();
    const d = new FormData(e.target), err = document.getElementById("error"), out = document.getElementById("out");
    const name = d.get('name'), hobbies = d.getAll('h');

    // Simple validation
    if (/[0-9]/.test(name)) return err.textContent = "No numbers in name!";
    if (!d.get('gen')) return err.textContent = "Select Gender!";
    if (hobbies.length === 0) return err.textContent = "Select a hobby!";

    err.textContent = "";
    out.style.display = "block";
    out.innerHTML = `<b>Success!</b><br>Name: ${name}<br>Age: ${d.get('age')}<br>Gender: ${d.get('gen')}<br>Hobbies: ${hobbies.join(', ')}`;
};
</script>

</body>
</html>
